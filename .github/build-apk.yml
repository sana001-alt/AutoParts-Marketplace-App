name: Build Android Webview APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Create Android Project Structure
      run: |
        mkdir -p app/src/main/java/com/autoparts/app
        mkdir -p app/src/main/res/layout
        mkdir -p app/src/main/res/values
        mkdir -p app/src/main/res/mipmap-hdpi

    - name: Create AndroidManifest.xml
      run: |
        cat << 'EOF' > app/src/main/AndroidManifest.xml
        <manifest xmlns:android="http://schemas.android.com/apk/res/android" package="com.autoparts.app">
            <uses-permission android:name="android.permission.INTERNET" />
            <application android:label="Auto Parts" android:icon="@mipmap/ic_launcher" android:theme="@android:style/Theme.NoTitleBar">
                <activity android:name=".MainActivity" android:exported="true">
                    <intent-filter>
                        <action android:name="android.intent.action.MAIN" />
                        <category android:name="android.intent.category.LAUNCHER" />
                    </intent-filter>
                </activity>
            </application>
        </manifest>
        EOF

    - name: Create MainActivity.java
      run: |
        cat << 'EOF' > app/src/main/java/com/autoparts/app/MainActivity.java
        package com.autoparts.app;
        import android.app.Activity;
        import android.os.Bundle;
        import android.webkit.WebView;
        import android.webkit.WebViewClient;

        public class MainActivity extends Activity {
            @Override
            protected void onCreate(Bundle savedInstanceState) {
                super.onCreate(savedInstanceState);
                WebView webView = new WebView(this);
                webView.getSettings().setJavaScriptEnabled(true);
                webView.getSettings().setDomStorageEnabled(true);
                webView.setWebViewClient(new WebViewClient());
                webView.loadUrl("https://ais-pre-micgqszjsglkhqfgnzraz-572875732715.asia-southeast1.run.app");
                setContentView(webView);
            }
        }
        EOF

    - name: Create build.gradle
      run: |
        cat << 'EOF' > build.gradle
        buildscript {
            repositories { google(); mavenCentral() }
            dependencies { classpath 'com.android.tools.build:gradle:8.2.2' }
        }
        allprojects {
            repositories { google(); mavenCentral() }
        }
        EOF
        cat << 'EOF' > app/build.gradle
        plugins { id 'com.android.application' }
        android {
            namespace 'com.autoparts.app'
            compileSdk 34
            defaultConfig {
                applicationId "com.autoparts.app"
                minSdk 21
                targetSdk 34
                versionCode 1
                versionName "1.0"
            }
        }
        EOF

    - name: Download App Icon Logo
      run: |
        curl -L "https://images.unsplash.com/photo-1616422285623-13ff0162193c?w=500" -o app/src/main/res/mipmap-hdpi/ic_launcher.png

    - name: Build Debug APK
      run: ./gradlew assembleDebug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Auto-Parts-App
        path: app/build/outputs/apk/debug/app-debug.apk
        
